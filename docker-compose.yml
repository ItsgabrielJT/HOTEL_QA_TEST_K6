networks:
  k6:
  grafana:

services:
  influxdb:
    image: influxdb:1.8
    networks:
      - k6
      - grafana
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  renderer:
    image: grafana/grafana-image-renderer:3.10.1
    networks:
      - grafana
    ports:
      - "8081:8081"
    environment:
      - ENABLE_METRICS=true
      - HTTP_HOST=0.0.0.0

  grafana:
    image: grafana/grafana:8.5.21
    networks:
      - grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yaml
      - ./grafana/provisioning/datasources/influxdb.yml:/etc/grafana/provisioning/datasources/datasource.yaml
    depends_on:
      influxdb:
        condition: service_healthy
      renderer:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # k6 corre como binario en el host (no como contenedor) para poder
  # conectarse directamente a la API backend que también corre en el host.
  # Ver scripts/run-k6-qa.sh — modo k6.
