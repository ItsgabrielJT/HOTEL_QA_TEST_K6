name: Reusable – Infrastructure

on:
  workflow_call:
    inputs:
      target_repo_url:
        description: URL del repo backend a clonar (ej. https://github.com/org/HOTEL-MVP.git)
        type: string
        required: false
      target_repo_branch:
        description: Rama del repo backend (por defecto vars.K6_TARGET_REPO_BRANCH o 'dev')
        type: string
        required: false
      qa_api_port:
        description: Puerto del backend (por defecto vars.K6_QA_API_PORT o 3100)
        type: string
        required: false
      qa_db_port:
        description: Puerto de PostgreSQL (por defecto vars.K6_QA_DB_PORT o 5540)
        type: string
        required: false
      event_name:
        description: Nombre del evento que disparó el workflow (para validar inputs)
        type: string
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  infra:
    name: Start Infrastructure
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      COMPOSE_PROJECT_NAME: hotel-k6-infra-${{ github.run_id }}
      TARGET_REPO_URL: ${{ inputs.target_repo_url || vars.K6_TARGET_REPO_URL || 'https://github.com/EGgames/HOTEL-MVP.git' }}
      TARGET_REPO_BRANCH: ${{ inputs.target_repo_branch || vars.K6_TARGET_REPO_BRANCH || 'dev' }}
      QA_API_PORT: ${{ inputs.qa_api_port || vars.K6_QA_API_PORT || '3100' }}
      QA_DB_PORT: ${{ inputs.qa_db_port || vars.K6_QA_DB_PORT || '5540' }}
      QA_ARTIFACTS_DIR: ${{ github.workspace }}/qa-artifacts/infra
      TARGET_CLONE_DIR: ${{ github.workspace }}/target-under-test
      QA_MODE: infra

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate workflow_dispatch inputs
        if: inputs.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "$QA_API_PORT" && ! "$QA_API_PORT" =~ ^[0-9]{2,5}$ ]]; then
            echo "::error::qa_api_port debe ser un número de puerto válido: '$QA_API_PORT'"
            exit 1
          fi
          if [[ -n "$QA_DB_PORT" && ! "$QA_DB_PORT" =~ ^[0-9]{2,5}$ ]]; then
            echo "::error::qa_db_port debe ser un número de puerto válido: '$QA_DB_PORT'"
            exit 1
          fi

      - name: Start infrastructure (clone target + Postgres + backend + InfluxDB + Grafana)
        run: bash scripts/run-k6-qa.sh
        env:
          QA_MODE: infra

      - name: Publish infra summary to GitHub Step Summary
        if: always()
        run: |
          SUMMARY="qa-artifacts/infra/reports/infra-summary.md"
          if [[ -f "$SUMMARY" ]]; then
            cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Infraestructura K6"
              echo ""
              echo "> No se generó el resumen de infraestructura."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Export infra metadata artifact
        if: always()
        run: |
          mkdir -p qa-artifacts/infra/pipeline
          printf 'TARGET_COMMIT=%s\n' \
            "$(git -C target-under-test rev-parse HEAD 2>/dev/null || echo unknown)" \
            > qa-artifacts/infra/pipeline/infra-meta.env

      - name: Upload infra metadata
        uses: actions/upload-artifact@v4
        with:
          name: infra-meta-${{ github.run_id }}
          path: qa-artifacts/infra/pipeline/infra-meta.env
          retention-days: 1

      - name: Teardown infrastructure
        if: always()
        run: |
          # Detener backend Node si quedó corriendo (el STATE_FILE tiene el PID)
          STATE="qa-artifacts/infra/.k6-qa-state"
          if [[ -f "$STATE" ]]; then
            API_PID=$(grep '^API_PID=' "$STATE" | cut -d= -f2 | tr -d "'" || echo '')
            if [[ -n "$API_PID" ]] && kill -0 "$API_PID" 2>/dev/null; then
              kill "$API_PID" || true
            fi
            TARGET_COMPOSE=$(grep '^TARGET_COMPOSE_FILE=' "$STATE" | cut -d= -f2 | tr -d "'" || echo '')
            if [[ -n "$TARGET_COMPOSE" && -f "$TARGET_COMPOSE" ]]; then
              docker compose -f "$TARGET_COMPOSE" down -v --remove-orphans || true
            fi
          fi
          # Detener InfluxDB + Grafana
          docker compose -f docker-compose.yml down -v --remove-orphans || true
