name: Reusable – K6 Smoke Tests

on:
  workflow_call:
    inputs:
      target_repo_url:
        description: URL del repo backend a clonar (ej. https://github.com/org/HOTEL-MVP.git)
        type: string
        required: false
      target_repo_branch:
        description: Rama del repo backend (por defecto vars.K6_TARGET_REPO_BRANCH o 'dev')
        type: string
        required: false
      qa_api_port:
        description: Puerto del backend (por defecto vars.K6_QA_API_PORT o 3100)
        type: string
        required: false
      qa_db_port:
        description: Puerto de PostgreSQL (por defecto vars.K6_QA_DB_PORT o 5540)
        type: string
        required: false
    outputs:
      smoke_exit_code:
        description: Código de salida del test k6
        value: ${{ jobs.smoke-tests.outputs.smoke_exit_code }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  smoke-tests:
    name: K6 Smoke Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      smoke_exit_code: ${{ steps.run-k6.outputs.exit_code }}
    env:
      COMPOSE_PROJECT_NAME: hotel-k6-tests-${{ github.run_id }}
      TARGET_REPO_URL: ${{ inputs.target_repo_url || vars.K6_TARGET_REPO_URL || 'https://github.com/EGgames/HOTEL-MVP.git' }}
      TARGET_REPO_BRANCH: ${{ inputs.target_repo_branch || vars.K6_TARGET_REPO_BRANCH || 'dev' }}
      QA_API_PORT: ${{ inputs.qa_api_port || vars.K6_QA_API_PORT || '3100' }}
      QA_DB_PORT: ${{ inputs.qa_db_port || vars.K6_QA_DB_PORT || '5540' }}
      QA_ARTIFACTS_DIR: ${{ github.workspace }}/qa-artifacts/k6
      TARGET_CLONE_DIR: ${{ github.workspace }}/target-under-test

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6
          k6 version

      - name: Create artifacts directory
        run: mkdir -p "$QA_ARTIFACTS_DIR/reports" "$QA_ARTIFACTS_DIR/logs"

      - name: Start infrastructure (clone target + Postgres + backend + InfluxDB + Grafana)
        run: bash scripts/run-k6-qa.sh
        env:
          QA_MODE: infra

      - name: Run K6 Smoke Tests
        id: run-k6
        run: |
          set +e
          bash scripts/run-k6-qa.sh
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          QA_MODE: k6

      - name: Generate HTML report
        if: always()
        run: |
          bash scripts/generate-smoke-report.sh \
            "$QA_ARTIFACTS_DIR/reports/summary.json" \
            "$QA_ARTIFACTS_DIR/reports/smoke-report.html" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            "" \
            2>/dev/null || echo "::warning::Reporte HTML no generado (summary.json no disponible)"

      - name: Publish test summary to GitHub Step Summary
        if: always()
        run: |
          SUMMARY="$QA_ARTIFACTS_DIR/reports/summary.json"
          EXIT_CODE="${{ steps.run-k6.outputs.exit_code }}"

          if [[ "$EXIT_CODE" == "0" ]]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="PASSED"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi

          {
            echo "## $STATUS_EMOJI K6 Smoke Test — $STATUS_TEXT"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Run ID | \`${{ github.run_id }}\` |"
            echo "| Commit QA | \`${{ github.sha }}\` |"
            echo "| Target Branch | \`$TARGET_REPO_BRANCH\` |"
            echo "| API Port | \`$QA_API_PORT\` |"
            echo ""

            if [[ -f "$SUMMARY" ]]; then
              echo "### Métricas clave"
              echo ""
              echo '```json'
              python3 -c "
          import json, sys
          with open('$SUMMARY') as f:
            d = json.load(f)
          metrics = d.get('metrics', {})
          keys = ['http_req_duration', 'http_req_failed', 'http_reqs', 'vus_max', 'checks']
          out = {}
          for k in keys:
            if k in metrics:
              out[k] = metrics[k]
          print(json.dumps(out, indent=2))
          "
              echo '```'
            else
              echo "> summary.json no disponible — el test pudo haber fallado antes de generar métricas."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Teardown infrastructure
        if: always()
        run: |
          STATE="$QA_ARTIFACTS_DIR/.k6-qa-state"
          if [[ -f "$STATE" ]]; then
            API_PID=$(grep '^API_PID=' "$STATE" | cut -d= -f2 | tr -d "'" || echo '')
            if [[ -n "$API_PID" ]] && kill -0 "$API_PID" 2>/dev/null; then
              kill "$API_PID" || true
            fi
            TARGET_COMPOSE=$(grep '^TARGET_COMPOSE_FILE=' "$STATE" | cut -d= -f2 | tr -d "'" || echo '')
            if [[ -n "$TARGET_COMPOSE" && -f "$TARGET_COMPOSE" ]]; then
              docker compose -f "$TARGET_COMPOSE" down -v --remove-orphans || true
            fi
          fi
          docker compose -f docker-compose.yml down -v --remove-orphans || true

      - name: Upload K6 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-artifacts-${{ github.run_id }}
          path: ${{ env.QA_ARTIFACTS_DIR }}
          if-no-files-found: warn
          retention-days: 14
