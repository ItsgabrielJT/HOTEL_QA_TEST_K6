name: Reusable – K6 Smoke Tests

on:
  workflow_call:
    inputs:
      qa_api_url:
        description: URL base de la API bajo prueba
        type: string
        required: false
      k6_env:
        description: Entorno k6 (local | qa | staging)
        type: string
        required: false
        default: qa
    outputs:
      smoke_exit_code:
        description: Código de salida del test k6
        value: ${{ jobs.smoke-tests.outputs.smoke_exit_code }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  smoke-tests:
    name: K6 Smoke Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      smoke_exit_code: ${{ steps.run-k6.outputs.exit_code }}
    env:
      COMPOSE_PROJECT_NAME: hotel-k6-tests-${{ github.run_id }}
      QA_BASE_URL: ${{ inputs.qa_api_url || vars.K6_QA_BASE_URL || 'http://host.docker.internal:3000/api/v1' }}
      K6_ENV: ${{ inputs.k6_env || 'qa' }}
      K6_ARTIFACTS_DIR: ${{ github.workspace }}/k6-artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create artifacts directory
        run: mkdir -p "$K6_ARTIFACTS_DIR/reports" "$K6_ARTIFACTS_DIR/logs"

      - name: Start InfluxDB and Grafana
        run: |
          docker compose up -d influxdb grafana
          echo "Servicios de observabilidad iniciados"

      - name: Wait for InfluxDB readiness
        run: |
          echo "Esperando InfluxDB..."
          for i in $(seq 1 30); do
            if curl --fail --silent --max-time 3 http://localhost:8086/ping; then
              echo "InfluxDB listo en intento $i"
              break
            fi
            sleep 5
          done
          curl --fail --silent http://localhost:8086/ping \
            || { echo "::error::InfluxDB no respondio a tiempo"; exit 1; }

      - name: Wait for Grafana readiness
        run: |
          echo "Esperando Grafana..."
          for i in $(seq 1 30); do
            if curl --fail --silent --max-time 3 http://localhost:3000/api/health | grep -q '"database": "ok"'; then
              echo "Grafana listo en intento $i"
              break
            fi
            sleep 5
          done

      - name: Install k6
        run: |
          curl -fsSL https://dl.grafana.com/enterprise/release/k6-v0.55.0-linux-amd64.deb \
            -o /tmp/k6.deb
          sudo dpkg -i /tmp/k6.deb
          k6 version

      - name: Run K6 Smoke Test
        id: run-k6
        run: |
          set +e
          k6 run \
            --out influxdb=http://localhost:8086/k6 \
            -e K6_ENV="$K6_ENV" \
            -e QA_BASE_URL="$QA_BASE_URL" \
            --summary-export="$K6_ARTIFACTS_DIR/reports/summary.json" \
            tests/smoke-test.js \
            2>&1 | tee "$K6_ARTIFACTS_DIR/logs/k6-smoke.log"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "K6 finalizo con codigo: $EXIT_CODE"
          exit $EXIT_CODE

      - name: Export Grafana dashboard snapshot
        if: always()
        run: |
          # Esperar que los datos lleguen a Grafana
          sleep 10

          # Buscar el UID del dashboard provisionado
          DASHBOARD_UID=$(curl --silent \
            "http://localhost:3000/api/search?type=dash-db" \
            | python3 -c "import json,sys; ds=json.load(sys.stdin); print(ds[0]['uid'] if ds else 'not-found')" \
            2>/dev/null || echo "not-found")

          echo "Dashboard UID: $DASHBOARD_UID"

          if [[ "$DASHBOARD_UID" != "not-found" ]]; then
            # Crear snapshot de Grafana
            SNAPSHOT=$(curl --silent --request POST \
              --url "http://localhost:3000/api/snapshots" \
              --header "Content-Type: application/json" \
              --data "{
                \"dashboard\": $(curl --silent http://localhost:3000/api/dashboards/uid/$DASHBOARD_UID | python3 -c 'import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get(\"dashboard\",{})))'),
                \"expires\": 604800,
                \"name\": \"K6 Smoke Test - Run ${{ github.run_id }}\"
              }" 2>/dev/null)

            SNAPSHOT_URL=$(echo "$SNAPSHOT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('url',''))" 2>/dev/null || echo "")
            echo "GRAFANA_SNAPSHOT_URL=$SNAPSHOT_URL" >> "$GITHUB_ENV"
            echo "Snapshot URL: $SNAPSHOT_URL"
          fi

          # Exportar JSON completo del dashboard para artifacts
          curl --silent "http://localhost:3000/api/dashboards/uid/$DASHBOARD_UID" \
            > "$K6_ARTIFACTS_DIR/reports/grafana-dashboard-export.json" 2>/dev/null || true

      - name: Generate HTML report from k6 summary
        if: always()
        run: |
          bash scripts/generate-smoke-report.sh \
            "$K6_ARTIFACTS_DIR/reports/summary.json" \
            "$K6_ARTIFACTS_DIR/reports/smoke-report.html" \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            "${GRAFANA_SNAPSHOT_URL:-}" \
            2>/dev/null || echo "::warning::Reporte HTML no generado (summary.json no disponible)"

      - name: Publish test summary to GitHub Step Summary
        if: always()
        run: |
          SUMMARY="$K6_ARTIFACTS_DIR/reports/summary.json"
          EXIT_CODE="${{ steps.run-k6.outputs.exit_code }}"

          if [[ "$EXIT_CODE" == "0" ]]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="PASSED"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi

          {
            echo "## $STATUS_EMOJI K6 Smoke Test — $STATUS_TEXT"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Run ID | \`${{ github.run_id }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Entorno | \`$K6_ENV\` |"
            echo "| API URL | \`$QA_BASE_URL\` |"
            echo ""

            if [[ -f "$SUMMARY" ]]; then
              echo "### Métricas clave"
              echo ""
              echo '```json'
              python3 -c "
          import json, sys
          with open('$SUMMARY') as f:
            d = json.load(f)
          metrics = d.get('metrics', {})
          keys = ['http_req_duration', 'http_req_failed', 'http_reqs', 'vus_max', 'checks']
          out = {}
          for k in keys:
            if k in metrics:
              out[k] = metrics[k]
          print(json.dumps(out, indent=2))
          "
              echo '```'
            else
              echo "> summary.json no disponible — el test pudo haber fallado antes de generar métricas."
            fi

            if [[ -n "${GRAFANA_SNAPSHOT_URL:-}" ]]; then
              echo ""
              echo "### Dashboard Grafana"
              echo ""
              echo "[Ver snapshot en Grafana]($GRAFANA_SNAPSHOT_URL)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Teardown infrastructure
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Upload K6 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-artifacts-${{ github.run_id }}
          path: ${{ env.K6_ARTIFACTS_DIR }}
          if-no-files-found: warn
          retention-days: 14
