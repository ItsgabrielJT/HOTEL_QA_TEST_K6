name: K6 Smoke QA

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: k6-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      target_repo_url:
        description: URL del repo backend a clonar (ej. https://github.com/org/HOTEL-MVP.git)
        required: false
      target_repo_branch:
        description: Rama del repo backend (por defecto 'dev')
        required: false
        default: dev
      qa_api_port:
        description: Puerto del backend (por defecto 3100)
        required: false
        default: '3100'
      qa_db_port:
        description: Puerto de PostgreSQL (por defecto 5540)
        required: false
        default: '5540'
      failure_issues_enabled:
        description: Crear issue automático cuando fallen los tests
        required: false
        default: 'false'
  push:
    branches:
      - main
    paths:
      - .github/workflows/k6-smoke.yml
      - .github/workflows/reusable-*.yml
      - tests/**
      - scenarios/**
      - clients/**
      - config/**
      - helpers/**
      - data/**
      - docker-compose.yml
      - grafana/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/k6-smoke.yml
      - .github/workflows/reusable-*.yml
      - tests/**
      - scenarios/**
      - clients/**
      - config/**
      - helpers/**
      - data/**
      - docker-compose.yml
      - grafana/**

jobs:

  lint:
    name: Lint
    uses: ./.github/workflows/reusable-lint.yml

  smoke-tests:
    name: K6 Smoke Tests
    needs: lint
    uses: ./.github/workflows/reusable-tests.yml
    with:
      target_repo_url: ${{ inputs.target_repo_url }}
      target_repo_branch: ${{ inputs.target_repo_branch || 'dev' }}
      qa_api_port: ${{ inputs.qa_api_port || '3100' }}
      qa_db_port: ${{ inputs.qa_db_port || '5540' }}

  publish-report:
    name: Publish Report & Summary
    needs: [lint, smoke-tests]
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      (
        needs.smoke-tests.result == 'success' ||
        needs.smoke-tests.result == 'failure'
      )
    uses: ./.github/workflows/reusable-publish.yml
    permissions:
      contents: read
      issues: write
      pages: write
      id-token: write
    with:
      failure_issues_enabled: ${{ inputs.failure_issues_enabled || 'false' }}
      smoke_result: ${{ needs.smoke-tests.result }}
